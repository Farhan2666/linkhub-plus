<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkHub+</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0a0014; --bg-card: rgba(255,255,255,0.06);
      --text-primary: #ffffff; --text-secondary: rgba(255,255,255,0.6);
      --accent-1: #5D34D0; --accent-2: #FF006E; --accent-3: #00F0FF;
      --border-color: rgba(255,255,255,0.08); --glow-color: #FF006E;
      --card-opacity: 0.06; --card-blur: 12px; --glow-intensity: 1;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
      background: var(--bg-primary); color: var(--text-primary);
      min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
    a { color: inherit; text-decoration: none; }

    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes slideIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .animate-float { animation: float 3s ease-in-out infinite; }
    .animate-slide-in { animation: slideIn 0.5s ease-out both; }

    #bg-overlay { position:fixed;inset:0;z-index:0;pointer-events:none;transition:background .5s; }
    #canvas-bg { position:fixed;inset:0;z-index:0;pointer-events:none; }
    #app { position:relative;z-index:1;min-height:100vh; }

    /* === Auth Pages === */
    .auth-page { display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px; }
    .auth-card {
      width:100%;max-width:400px;padding:40px 32px;border-radius:24px;
      background:rgba(255,255,255,0.03);border:1px solid var(--border-color);
      backdrop-filter:blur(16px);
    }
    .auth-card h1 { font-size:24px;font-weight:700;margin-bottom:4px; }
    .auth-card p { font-size:14px;color:var(--text-secondary);margin-bottom:28px; }
    .auth-input {
      width:100%;padding:12px 16px;border-radius:12px;margin-bottom:14px;
      background:rgba(255,255,255,0.04);border:1px solid var(--border-color);
      color:white;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;
    }
    .auth-input:focus { border-color:var(--accent-3); }
    .auth-btn {
      width:100%;padding:12px;border-radius:12px;border:none;
      font-size:14px;font-weight:600;color:white;cursor:pointer;transition:opacity .2s;
    }
    .auth-btn:hover { opacity:.85; }
    .auth-link { display:block;text-align:center;margin-top:16px;font-size:13px;color:var(--text-secondary); }
    .auth-link a { color:var(--accent-3);cursor:pointer; }
    .auth-link a:hover { opacity:.7; }
    .auth-error { font-size:12px;color:#f87171;margin-bottom:12px;min-height:18px; }
    .auth-success { font-size:12px;color:#34d399;margin-bottom:12px;min-height:18px; }
    .auth-username-row { display:flex;gap:8px;align-items:center; }
    .auth-username-row span { color:var(--text-secondary);font-size:14px;white-space:nowrap; }
    .auth-username-row input { flex:1; }

    /* === Dashboard === */
    .dash-header {
      position:sticky;top:0;z-index:30;
      display:flex;align-items:center;justify-content:space-between;
      padding:12px 20px;backdrop-filter:blur(12px);
      background:rgba(10,0,20,0.8);border-bottom:1px solid var(--border-color);
    }
    .dash-header h2 { font-size:16px;font-weight:600; }
    .dash-header-right { display:flex;align-items:center;gap:12px; }
    .dash-username { font-size:12px;color:var(--text-secondary); }
    .dash-btn {
      padding:7px 16px;border-radius:10px;font-size:12px;font-weight:500;
      background:rgba(255,255,255,0.06);border:1px solid var(--border-color);
      color:var(--text-primary);cursor:pointer;transition:all .2s;
    }
    .dash-btn:hover { background:rgba(255,255,255,0.1); }
    .dash-btn-primary {
      background:linear-gradient(135deg,var(--accent-1),var(--accent-2));border:none;
    }
    .dash-btn-danger { color:#f87171; }
    .dash-content { max-width:600px;margin:0 auto;padding:24px 16px; }

    /* === Public Profile === */
    .profile-section {
      display:flex;flex-direction:column;align-items:center;text-align:center;
      padding:64px 24px 32px;
    }
    .avatar-ring {
      width:112px;height:112px;border-radius:50%;margin-bottom:24px;
      display:flex;align-items:center;justify-content:center;
      font-size:36px;font-weight:700;overflow:hidden;
      border:2px solid var(--accent-3);
      box-shadow:0 0 20px color-mix(in srgb,var(--glow-color) 25%,transparent);
      position:relative;
    }
    .avatar-ring img { width:100%;height:100%;object-fit:cover; }
    .profile-name { font-size:22px;font-weight:600;letter-spacing:-.02em;margin-bottom:6px; }
    .profile-bio { font-size:14px;color:var(--text-secondary);margin-bottom:12px; }
    .profile-status {
      display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:999px;
      font-size:12px;font-weight:500;background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(8px);
    }
    .links-section { padding:0 24px 24px;max-width:480px;margin:0 auto;width:100%; }
    .links-header {
      display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;
    }
    .links-header h2 {
      font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-secondary);
    }
    .link-card {
      display:flex;align-items:center;gap:16px;padding:16px 20px;border-radius:16px;margin-bottom:12px;
      background:rgba(255,255,255,var(--card-opacity));border:1px solid var(--border-color);
      backdrop-filter:blur(var(--card-blur));text-decoration:none;color:inherit;
      transition:all .3s;position:relative;overflow:hidden;
    }
    .link-card:hover {
      background:rgba(255,255,255,calc(var(--card-opacity) + .04));
      border-color:color-mix(in srgb,var(--glow-color) 20%,transparent);
    }
    .link-card-glow { position:absolute;inset:0;opacity:0;transition:opacity .5s; }
    .link-card:hover .link-card-glow { opacity:1; }
    .link-card-icon { font-size:20px;flex-shrink:0;position:relative; }
    .link-card-body { flex:1;min-width:0;position:relative; }
    .link-card-title { font-size:14px;font-weight:500;position:relative; }
    .link-card-desc { font-size:11px;color:var(--text-secondary);margin-top:2px;line-height:1.3; }
    .link-card-arrow { width:16px;height:16px;flex-shrink:0;color:var(--accent-3);transition:transform .2s;position:relative; }
    .link-card:hover .link-card-arrow { transform:translateX(2px); }
    .link-card-bar { position:absolute;bottom:0;left:0;height:2px;width:0;transition:width .5s; }
    .link-card:hover .link-card-bar { width:100%; }
    .link-category {
      font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
      color:var(--text-secondary);padding:4px 4px 8px;margin-top:8px;display:flex;align-items:center;gap:8px;
    }
    .link-category::after { content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border-color),transparent); }
    .social-section { padding:0 24px 32px;max-width:480px;margin:0 auto;width:100%; }
    .social-section h2 { font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:12px; }
    .social-row { display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap; }
    .social-icon-btn {
      width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;
      background:rgba(255,255,255,var(--card-opacity));border:1px solid var(--border-color);
      backdrop-filter:blur(var(--card-blur));color:var(--text-secondary);text-decoration:none;transition:all .2s;
    }
    .social-icon-btn:hover { transform:scale(1.1); }
    .footer-section { padding:0 24px 32px;text-align:center;margin-top:auto; }
    .public-footer { padding:24px;text-align:center;color:var(--text-secondary);font-size:11px; }
    .public-footer a { color:var(--accent-3);cursor:pointer; }

    /* === Customizer Panel === */
    .customizer-overlay { position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.6);animation:fadeIn .2s; }
    .customizer-panel {
      position:fixed;top:0;right:0;bottom:0;width:100%;max-width:400px;z-index:51;
      background:rgba(10,0,20,0.97);backdrop-filter:blur(20px);
      border-left:1px solid var(--border-color);overflow-y:auto;padding:24px;animation:slideIn .3s;
    }
    .customizer-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:32px; }
    .customizer-header h2 { font-size:18px;font-weight:600; }
    .customizer-close { width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:none;border:none;color:white;cursor:pointer; }
    .customizer-close:hover { background:rgba(255,255,255,0.1); }
    .cz-section { margin-bottom:32px; }
    .cz-section-title { font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:12px; }
    .cz-field { margin-bottom:12px; }
    .cz-field label { display:block;font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:4px; }
    .cz-field input[type="text"],.cz-field input[type="url"] {
      width:100%;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,0.04);
      border:1px solid var(--border-color);color:white;font-size:13px;font-family:inherit;outline:none;
    }
    .cz-field input:focus { border-color:var(--accent-3); }
    .cz-field input[type="range"] { width:100%;height:4px;-webkit-appearance:none;background:rgba(255,255,255,0.1);border-radius:2px;outline:none; }
    .cz-field input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent-3);cursor:pointer; }
    .cz-field input[type="color"] { width:32px;height:32px;border-radius:8px;cursor:pointer;background:transparent;border:1px solid var(--border-color);padding:2px; }
    .cz-row { display:flex;align-items:center;gap:8px; }
    .cz-bg-type-row { display:flex;gap:8px; }
    .cz-bg-type-btn {
      flex:1;padding:8px 12px;border-radius:10px;font-size:12px;font-weight:500;text-align:center;
      background:rgba(255,255,255,0.04);border:1px solid var(--border-color);
      color:var(--text-secondary);cursor:pointer;transition:all .2s;
    }
    .cz-bg-type-btn.active { background:color-mix(in srgb,var(--accent-3) 12%,transparent);border-color:color-mix(in srgb,var(--accent-3) 30%,transparent);color:var(--accent-3); }
    .cz-link-item { padding:12px;border-radius:12px;margin-bottom:12px;background:rgba(255,255,255,0.03);border:1px solid var(--border-color);transition:transform .15s,opacity .15s; }
    .cz-link-item.dragging { opacity:.4;transform:scale(.97); }
    .cz-link-item.drag-over { border-color:var(--accent-3);box-shadow:0 0 12px color-mix(in srgb,var(--accent-3) 30%,transparent);transform:scale(1.01); }
    .cz-link-header { display:flex;align-items:center;gap:8px;margin-bottom:8px; }
    .drag-handle { cursor:grab;color:var(--text-secondary);flex-shrink:0;display:flex;padding:2px;touch-action:none; }
    .drag-handle:hover { color:var(--accent-3); }
    .link-title { font-size:12px;color:var(--text-secondary);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
    .cz-link-remove { font-size:12px;color:#f87171;background:none;border:none;cursor:pointer;flex-shrink:0; }
    .cz-add-btn { width:100%;padding:10px;border-radius:12px;font-size:13px;font-weight:500;border:1px dashed var(--border-color);background:none;color:var(--text-secondary);cursor:pointer; }
    .cz-short-input { max-width:80px;text-align:center; }

    /* Spinner */
    .spinner { width:24px;height:24px;border:3px solid var(--border-color);border-top-color:var(--accent-3);border-radius:50%;animation:spin .6s linear infinite;margin:40px auto; }
    @keyframes spin { to{transform:rotate(360deg)} }

    .page-loading { display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:12px; }
    .page-loading p { font-size:13px;color:var(--text-secondary); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    // ========== Config ==========
    const SUPABASE_URL = 'https://rnbfzfwkxxdpixhvilnx.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_FiSWuZYttL-vyXLqz5B99g_EVT-qxP_'
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // ========== App State ==========
    let currentUser = null
    let currentRoute = ''
    let userProfile = null

    // ========== Router ==========
    function navigate(hash) {
      window.location.hash = hash
    }

    window.addEventListener('hashchange', route)
    window.route = navigate

    function getHash() { return window.location.hash.slice(1) || '/login' }

    function showFatal(msg) {
      document.getElementById('root').innerHTML = '<div style="padding:40px;color:#f87171;text-align:center;font-family:sans-serif"><h2>Something went wrong</h2><p style="margin-top:12px;font-size:14px">'+esc(msg)+'</p></div>'
    }

    async function route() {
      try {
        const hash = getHash()
        currentRoute = hash

        if (hash.includes('type=recovery') || hash.includes('access_token')) {
          var p = new URLSearchParams(hash)
          var at = p.get('access_token')
          var rt = p.get('refresh_token')
          if (at) await supabase.auth.setSession({ access_token: at, refresh_token: rt })
          const { data: { user } } = await supabase.auth.getUser()
          currentUser = user
          if (hash.includes('type=recovery') && user) {
            renderResetPassword()
            return
          }
          if (currentUser) { navigate('/dashboard'); return }
          navigate('/login')
          return
        }

        const { data: { user } } = await supabase.auth.getUser()
        currentUser = user

        if (hash.startsWith('/u/')) {
          const username = hash.slice(3)
          renderPublicProfile(username)
        } else if (hash === '/login' || hash === '/register') {
          if (currentUser) { navigate('/dashboard'); return }
          renderAuth(hash === '/register')
        } else if (hash === '/dashboard') {
          if (!currentUser) { navigate('/login'); return }
          renderDashboard()
        } else if (hash === '/forgot-password') {
          if (currentUser) { navigate('/dashboard'); return }
          renderForgotPassword()
        } else {
          navigate('/login')
        }
      } catch(e) { showFatal(e.message) }
    }

    // ========== Render Auth ==========
    function renderAuth(isRegister) {
      const title = isRegister ? 'Create Account' : 'Welcome Back'
      const subtitle = isRegister ? 'Create your LinkHub+ page' : 'Sign in to your dashboard'
      const toggle = isRegister
        ? "Already have an account? <a onclick=\"route()\">Sign in</a>"
        : "Don't have an account? <a onclick=\"navigate('/register')\">Create one</a>"
      const extraLink = isRegister ? '' : '<div style="margin-top:4px"><a onclick="navigate(\'/forgot-password\')" style="color:var(--text-secondary);font-size:12px;cursor:pointer">Forgot password?</a></div>'
      const usernameField = isRegister
        ? '<div class="auth-username-row"><input class="auth-input" id="auth-username" type="text" placeholder="username" style="margin-bottom:0" /><span>.linkhub.page</span></div><div style="margin-bottom:14px"></div>'
        : ''

      document.getElementById('root').innerHTML = `
        <div id="bg-overlay" style="position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,var(--accent-1),var(--accent-2))"></div>
        <div class="auth-page">
          <div class="auth-card animate-slide-in">
            <h1>${title}</h1>
            <p>${subtitle}</p>
            <div class="auth-error" id="auth-error"></div>
            <div class="auth-success" id="auth-success"></div>
            <input class="auth-input" id="auth-email" type="email" placeholder="Email" autocomplete="email" />
            <input class="auth-input" id="auth-password" type="password" placeholder="Password" autocomplete="${isRegister ? 'new-password' : 'current-password'}" />
            ${usernameField}
            <button class="auth-btn" id="auth-submit" style="background:linear-gradient(135deg,var(--accent-1),var(--accent-2))">
              ${isRegister ? 'Create Account' : 'Sign In'}
            </button>
            <div class="auth-link">${toggle}${extraLink}</div>
          </div>
        </div>`

      document.getElementById('auth-submit').onclick = async () => {
        try {
          const email = document.getElementById('auth-email').value
          const pass = document.getElementById('auth-password').value
          const errEl = document.getElementById('auth-error')
          errEl.textContent = ''
          if (!email || !pass) { errEl.textContent = 'Fill in all fields'; return }

          if (isRegister) {
            const username = document.getElementById('auth-username').value
            if (!username || !/^[a-z0-9_]{3,20}$/.test(username)) {
              errEl.textContent = 'Username: 3-20 chars, lowercase, numbers, underscore'
              return
            }
            document.getElementById('auth-submit').disabled = true
            document.getElementById('auth-submit').textContent = 'Creating...'
            const { data, error } = await supabase.auth.signUp({ email, password: pass })
            if (error) { errEl.textContent = error.message; document.getElementById('auth-submit').disabled = false; document.getElementById('auth-submit').textContent = 'Create Account'; return }
            if (!data.user) { errEl.textContent = 'Signup failed - no user returned'; document.getElementById('auth-submit').disabled = false; document.getElementById('auth-submit').textContent = 'Create Account'; return }
            const { error: profErr } = await supabase.from('profiles').insert({
              id: data.user.id, username: username,
              page_data: getDefaultData()
            })
            if (profErr) { errEl.textContent = profErr.message; document.getElementById('auth-submit').disabled = false; document.getElementById('auth-submit').textContent = 'Create Account'; return }
            navigate('/dashboard')
          } else {
            document.getElementById('auth-submit').disabled = true
            document.getElementById('auth-submit').textContent = 'Signing in...'
            const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass })
            if (error) { errEl.textContent = error.message; document.getElementById('auth-submit').disabled = false; document.getElementById('auth-submit').textContent = 'Sign In'; return }
            navigate('/dashboard')
          }
        } catch(e) { document.getElementById('auth-error').textContent = 'Error: ' + e.message; document.getElementById('auth-submit').disabled = false; document.getElementById('auth-submit').textContent = isRegister ? 'Create Account' : 'Sign In' }
      }

      if (isRegister) {
        document.getElementById('auth-username').oninput = function() {
          this.value = this.value.toLowerCase().replace(/[^a-z0-9_]/g, '')
        }
      }
    }

    // ========== Forgot Password ==========
    function renderForgotPassword() {
      document.getElementById('root').innerHTML = `
        <div id="bg-overlay" style="position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,var(--accent-1),var(--accent-2))"></div>
        <div class="auth-page">
          <div class="auth-card animate-slide-in">
            <h1>Reset Password</h1>
            <p>Enter your email and we'll send you a reset link</p>
            <div class="auth-error" id="auth-error"></div>
            <div class="auth-success" id="auth-success"></div>
            <input class="auth-input" id="reset-email" type="email" placeholder="Email" autocomplete="email" />
            <button class="auth-btn" id="reset-submit" style="background:linear-gradient(135deg,var(--accent-1),var(--accent-2))">Send Reset Link</button>
            <div class="auth-link"><a onclick="navigate('/login')">Back to sign in</a></div>
          </div>
        </div>`

      document.getElementById('reset-submit').onclick = async () => {
        const email = document.getElementById('reset-email').value
        const errEl = document.getElementById('auth-error')
        const sucEl = document.getElementById('auth-success')
        errEl.textContent = ''; sucEl.textContent = ''
        if (!email) { errEl.textContent = 'Enter your email'; return }
        document.getElementById('reset-submit').disabled = true
        document.getElementById('reset-submit').textContent = 'Sending...'
        const { error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin
        })
        if (error) { errEl.textContent = error.message; document.getElementById('reset-submit').disabled = false; document.getElementById('reset-submit').textContent = 'Send Reset Link'; return }
        sucEl.textContent = 'Check your email for the reset link!'
        document.getElementById('reset-submit').textContent = 'Sent'
      }
    }

    function renderResetPassword() {
      document.getElementById('root').innerHTML = `
        <div id="bg-overlay" style="position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,var(--accent-1),var(--accent-2))"></div>
        <div class="auth-page">
          <div class="auth-card animate-slide-in">
            <h1>Set New Password</h1>
            <p>Enter your new password</p>
            <div class="auth-error" id="auth-error"></div>
            <div class="auth-success" id="auth-success"></div>
            <input class="auth-input" id="new-password" type="password" placeholder="New password" autocomplete="new-password" />
            <button class="auth-btn" id="reset-confirm" style="background:linear-gradient(135deg,var(--accent-1),var(--accent-2))">Update Password</button>
            <div class="auth-link"><a onclick="navigate('/login')">Back to sign in</a></div>
          </div>
        </div>`

      document.getElementById('reset-confirm').onclick = async () => {
        const pass = document.getElementById('new-password').value
        const errEl = document.getElementById('auth-error')
        const sucEl = document.getElementById('auth-success')
        errEl.textContent = ''; sucEl.textContent = ''
        if (!pass || pass.length < 6) { errEl.textContent = 'Password must be at least 6 characters'; return }
        document.getElementById('reset-confirm').disabled = true
        document.getElementById('reset-confirm').textContent = 'Updating...'
        const { error } = await supabase.auth.updateUser({ password: pass })
        if (error) { errEl.textContent = error.message; document.getElementById('reset-confirm').disabled = false; document.getElementById('reset-confirm').textContent = 'Update Password'; return }
        sucEl.textContent = 'Password updated! Redirecting...'
        await supabase.auth.signOut()
        setTimeout(function() { navigate('/login') }, 1500)
      }
    }

    async function renderDashboard() {

      root.innerHTML = `
        <div class="dash-header">

          <div class="dash-header-right">
            <span class="dash-username" id="dash-username"></span>

      // Fetch profile
      const { data: prof, error } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single()
      if (error) {
        // Create if not exists
        const username = currentUser.email.split('@')[0].replace(/[^a-z0-9_]/g, '').slice(0, 20)
        const { data: newProf, error: insErr } = await supabase.from('profiles').insert({

      dashData = userProfile.page_data || getDefaultData()

    // Mutation handlers
    window.uploadAvatar = function(input) {
      var file = input.files[0]
      if (!file) return
      if (file.size > 2097152) { alert('Image too large. Max 2MB.'); return }
      var reader = new FileReader()
      reader.onload = function(e) { dashData.profile.avatar = e.target.result; saveDashData(); renderCustomizerPage(dashData) }
      reader.readAsDataURL(file)
      input.value = ''
    }

    window.updateTheme = function(field, val) { dashData.theme[field] = val; saveDashData(); renderCustomizerPage(dashData) }
    window.updateBgType = function(t) { dashData.theme.bgType = t; saveDashData(); renderCustomizerPage(dashData) }
    window.updateLink = function(id, field, val) {
      var l = dashData.links.find(function(l) { return l.id === id })
      if (l) { l[field] = val; saveDashData(); renderCustomizerPage(dashData) }
    }
    window.removeLink = function(btn) {
      var id = btn.getAttribute('data-link-id')
      dashData.links = dashData.links.filter(function(l) { return l.id !== id })
      saveDashData(); renderCustomizerPage(dashData)
    }
    window.addLink = function() {
      dashData.links.push({id:crypto.randomUUID(),title:'New Project',url:'https://',icon:'\uD83D\uDD17',description:'',category:'',color:''})
      saveDashData(); renderCustomizerPage(dashData)
    }
    window.updateSocial = function(idx, field, val) {
      if (dashData.socials[idx]) { dashData.socials[idx][field] = val; saveDashData(); renderCustomizerPage(dashData) }
    }

    // Drag reorder
    var dragSrcId = null
    window.onDragStart = function(e) {
      dragSrcId = e.target.closest('.cz-link-item').getAttribute('data-link-id')
      e.target.closest('.cz-link-item').classList.add('dragging')
      e.dataTransfer.effectAllowed = 'move'
    }
    window.onDragOver = function(e) {
      e.preventDefault(); e.dataTransfer.dropEffect = 'move'
      document.querySelectorAll('.cz-link-item').forEach(function(el) { el.classList.remove('drag-over') })
      var t = e.target.closest('.cz-link-item')
      if (t && t.getAttribute('data-link-id') !== dragSrcId) t.classList.add('drag-over')
    }
    window.onDrop = function(e) {
      e.preventDefault()
      document.querySelectorAll('.cz-link-item').forEach(function(el) { el.classList.remove('drag-over','dragging') })
      var tid = e.target.closest('.cz-link-item')?.getAttribute('data-link-id')
      if (!dragSrcId || !tid || dragSrcId === tid) return
      var fi = dashData.links.findIndex(function(l) { return l.id === dragSrcId })
      var ti = dashData.links.findIndex(function(l) { return l.id === tid })
      if (fi === -1 || ti === -1) return
      var item = dashData.links.splice(fi, 1)[0]
      dashData.links.splice(ti, 0, item)
      dragSrcId = null; saveDashData(); renderCustomizerPage(dashData)
    }
    window.onDragEnd = function() {
      document.querySelectorAll('.cz-link-item').forEach(function(el) { el.classList.remove('dragging','drag-over') })
      dragSrcId = null
    }

    // ========== Helpers ==========
    function applyTheme(t) {
      const root = document.documentElement
      root.style.setProperty('--accent-1', t.primaryColor)
      root.style.setProperty('--accent-2', t.secondaryColor)
      root.style.setProperty('--accent-3', t.accentColor)
      root.style.setProperty('--glow-color', t.accentColor)
      root.style.setProperty('--card-opacity', String(t.cardOpacity))
      root.style.setProperty('--card-blur', t.cardBlur + 'px')
      root.style.setProperty('--glow-intensity', String(t.glowIntensity))
      const overlay = document.getElementById('bg-overlay')
      if (overlay) overlay.style.background = t.bgType === 'gradient'
        ? 'linear-gradient(135deg, ' + t.primaryColor + ', ' + t.secondaryColor + ')'
        : t.solidColor
    }

    function esc(str) { var d = document.createElement('div'); d.textContent = str; return d.innerHTML }

    // Particles
    var particlesState = { particles: [], mouseX: -1000, mouseY: -1000, animId: null }
    function initParticles(theme) {
      const canv = document.getElementById('canvas-bg')
      if (!canv) return
      const ctx = canv.getContext('2d')
      if (!ctx) return
      canv.width = window.innerWidth; canv.height = window.innerHeight
      if (particlesState.animId) cancelAnimationFrame(particlesState.animId)
      const count = theme.particleCount
      particlesState.particles = Array.from({length:count}, function() {
        return { x:Math.random()*canv.width, y:Math.random()*canv.height, vx:(Math.random()-.5)*.5, vy:(Math.random()-.5)*.5, size:Math.random()*3+1, alpha:Math.random()*.5+.1, alphaDir:Math.random()>.5?1:-1 }
      })
      function animate() {
        ctx.clearRect(0,0,canv.width,canv.height)
        const color = theme.particleColor
        for (var i=0;i<particlesState.particles.length;i++) {
          var p = particlesState.particles[i]
          var dx = particlesState.mouseX - p.x, dy = particlesState.mouseY - p.y, dist = Math.sqrt(dx*dx+dy*dy)
          if (dist < 150) { var f = (150-dist)/150*.02; p.vx -= dx*f; p.vy -= dy*f }
          p.vx += (Math.random()-.5)*.01; p.vy += (Math.random()-.5)*.01
          p.vx *= .99; p.vy *= .99; p.x += p.vx; p.y += p.vy
          p.alpha += p.alphaDir*.003; if (p.alpha>.8||p.alpha<.1) p.alphaDir*=-1
          if (p.x<0) p.x=canv.width; if (p.x>canv.width) p.x=0; if (p.y<0) p.y=canv.height; if (p.y>canv.height) p.y=0
          ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fillStyle=color; ctx.globalAlpha=p.alpha; ctx.fill()
          for (var j=i+1;j<particlesState.particles.length;j++) {
            var p2=particlesState.particles[j],dx2=p.x-p2.x,dy2=p.y-p2.y,dist2=Math.sqrt(dx2*dx2+dy2*dy2)
            if (dist2<100) { ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p2.x,p2.y);ctx.strokeStyle=color;ctx.globalAlpha=(1-dist2/100)*.15;ctx.stroke() }
          }
        }
        ctx.globalAlpha=1; particlesState.animId=requestAnimationFrame(animate)
      }
      animate()
    }

    document.addEventListener('mousemove', function(e) { particlesState.mouseX = e.clientX; particlesState.mouseY = e.clientY })
